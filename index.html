<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ginger House Decoration</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0FF;--bg2:#EDE8FF;
  --purple:#7C5CBF;--purple2:#9B7FD4;--purple3:#B8A0E8;
  --lavender:#E8E0FF;--lavenderD:#C8B8F0;
  --orange:#F07B1F;--amber:#E8960C;
  --brown:#5A3A7A;--brown2:#7A5A9A;
  --txt2:#6A4A8A;--txt3:#9A80B8;
  --green:#2ECC71;--gl:#D4F7E5;--gd:#27AE60;
  --red:#E74C3C;--rl:#FDECEA;--pink:#E91E8C;
  --sh:rgba(124,92,191,0.13);--sh2:rgba(124,92,191,0.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--brown);min-height:100vh;overflow-x:hidden;}

/* BG sparkle dots */
#bgd{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bd{position:absolute;border-radius:50%;animation:bdF ease-in-out infinite;}
@keyframes bdF{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.1);}}

.scr{min-height:100vh;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
@keyframes wB{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-10px) rotate(3deg);}}
.footer{margin-top:18px;color:var(--txt3);font-size:.73rem;font-weight:700;text-align:center;}

/* WELCOME */
.w-title{font-family:'Baloo 2',cursive;font-size:clamp(2rem,6vw,3.4rem);font-weight:800;background:linear-gradient(135deg,#7C5CBF,#B8A0E8,#9B7FD4);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;line-height:1.15;margin-bottom:8px;}
.w-sub{color:var(--txt2);font-size:.95rem;font-weight:600;text-align:center;max-width:440px;line-height:1.6;margin-bottom:26px;}
.wcard{background:#fff;border-radius:28px;padding:32px 28px;width:min(440px,92vw);box-shadow:0 8px 40px var(--sh2),0 0 0 1px rgba(184,160,232,.2);}
.flbl{font-size:.73rem;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;}
.finp{width:100%;border:2px solid var(--lavenderD);border-radius:13px;padding:13px 17px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--brown);background:#FDFAFF;outline:none;transition:all .22s;margin-bottom:18px;}
.finp:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,92,191,.12);}
.finp::placeholder{color:#C0A8D8;}
.bp{width:100%;border:none;border-radius:14px;padding:15px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:7px;}
.bpur{background:linear-gradient(135deg,#9B7FD4,#7C5CBF);color:#fff;box-shadow:0 6px 20px rgba(124,92,191,.4);}
.bpur:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,92,191,.5);}
.bpk{background:linear-gradient(135deg,#E91E8C,#C2185B);color:#fff;box-shadow:0 5px 18px rgba(233,30,140,.35);}
.bpk:hover{transform:translateY(-2px);}
.w-icons{display:flex;gap:18px;margin-top:20px;justify-content:center;}
.w-icons span{font-size:2rem;animation:wB 2.5s ease-in-out infinite;}

/* GUIDE */
.gwrap{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;position:relative;z-index:1;}
.gcard{background:#fff;border-radius:30px;padding:36px 30px;width:min(560px,94vw);box-shadow:0 12px 50px var(--sh2);border:3px solid var(--lavenderD);text-align:center;}
.gtitle{font-family:'Baloo 2',cursive;font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,#7C5CBF,#B8A0E8);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:5px;}
.gsub{color:var(--txt2);font-size:.88rem;font-weight:600;margin-bottom:24px;}
.gsteps{display:flex;flex-direction:column;gap:11px;margin-bottom:24px;text-align:left;}
.gstep{display:flex;align-items:flex-start;gap:13px;padding:13px 15px;background:var(--bg2);border-radius:14px;border-left:4px solid var(--purple);animation:gSl .4s ease both;}
@keyframes gSl{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:translateX(0);}}
.gsi{font-size:1.9rem;flex-shrink:0;}.gst{font-weight:800;color:var(--brown);font-size:.92rem;margin-bottom:1px;}.gsd{color:var(--txt2);font-size:.8rem;font-weight:600;line-height:1.4;}
.gpbar{width:100%;height:8px;background:var(--lavenderD);border-radius:20px;overflow:hidden;margin:10px 0 16px;}
.gpfill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple2));border-radius:20px;transition:width .5s linear;}
.gcnt{font-family:'Baloo 2',cursive;font-size:3.2rem;font-weight:800;background:linear-gradient(135deg,#7C5CBF,#B8A0E8);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;animation:cP .9s ease-in-out infinite;}
@keyframes cP{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

/* CHOOSE */
.pwt{font-size:.95rem;font-weight:700;color:var(--purple2);margin-bottom:7px;text-align:center;}
.ptitle{font-family:'Baloo 2',cursive;font-size:clamp(1.7rem,5vw,2.6rem);font-weight:800;color:var(--brown);text-align:center;margin-bottom:5px;}
.psub{color:var(--txt2);font-size:.9rem;font-weight:600;text-align:center;margin-bottom:32px;}
.cgrid{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;}
.cc{background:#fff;border-radius:26px;padding:28px 20px;width:250px;text-align:center;cursor:pointer;transition:all .32s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 6px 28px var(--sh2);border:3px solid transparent;}
.cc.ck{border-color:var(--lavenderD);}.cc.hh{border-color:#F9C0D8;}
.cc:hover{transform:translateY(-10px) scale(1.04);box-shadow:0 20px 48px var(--sh2);}
.cce{display:block;margin:0 auto 14px;width:110px;height:100px;}
.ccn{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:var(--brown);margin-bottom:7px;}
.ccd{color:var(--txt2);font-size:.82rem;line-height:1.5;margin-bottom:18px;}
.ccb{border:none;border-radius:50px;padding:9px 22px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;color:#fff;display:inline-block;}
.ck .ccb{background:linear-gradient(135deg,#9B7FD4,#7C5CBF);}
.hh .ccb{background:linear-gradient(135deg,#E91E8C,#C2185B);}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(245,240,255,.97);backdrop-filter:blur(12px);border-bottom:2px solid rgba(184,160,232,.3);padding:9px 18px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;box-shadow:0 2px 14px var(--sh);}
.hud-name{font-weight:800;color:var(--brown);font-size:.9rem;display:flex;align-items:center;gap:5px;}
.hud-badge{background:var(--lavender);border:1.5px solid var(--lavenderD);border-radius:20px;padding:4px 12px;font-weight:800;color:var(--purple);font-size:.78rem;display:flex;align-items:center;gap:4px;}
.hud-tmr{background:var(--lavender);border:2px solid var(--lavenderD);border-radius:20px;padding:5px 13px;font-weight:800;font-size:.95rem;color:var(--purple);display:flex;align-items:center;gap:5px;}
.hud-tmr.urg{background:#FDECEA;border-color:var(--red);color:var(--red);animation:tPul .5s infinite;}
@keyframes tPul{0%,100%{opacity:1;}50%{opacity:.5;}}
.hpbw{flex:1;max-width:170px;}
.hpbb{background:var(--lavenderD);border-radius:10px;height:7px;overflow:hidden;}
.hpb{height:100%;border-radius:10px;background:linear-gradient(90deg,#9B7FD4,#2ECC71);transition:width .5s ease;}
.hpt{font-size:.65rem;font-weight:700;color:var(--txt2);margin-top:2px;}
.mbtn{background:var(--lavender);border:1.5px solid var(--lavenderD);border-radius:50%;width:33px;height:33px;font-size:.88rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.mbtn:hover{background:var(--lavenderD);transform:scale(1.1);}

/* KITCHEN — CLEAN LAYOUT v3 */
.kw{padding-top:66px;min-height:100vh;background:#2D1B4E;display:flex;flex-direction:column;}
.khdr{padding:10px 18px 8px;background:rgba(245,240,255,.98);border-bottom:2px solid #A888D8;text-align:center;}

.k-room{position:relative;margin:10px 14px 0;height:460px;overflow:hidden;border-radius:16px 16px 0 0;border:4px solid #4A3070;box-shadow:0 0 0 2px #2D1B4E,0 8px 32px rgba(0,0,0,.5);}
.k-floor{position:absolute;inset:0;z-index:0;background-color:#EAE0F8;background-image:repeating-conic-gradient(#E0D4F5 0% 25%,#D4C8EC 0% 50%);background-size:44px 44px;}
.k-wall{position:absolute;top:0;left:0;right:0;height:170px;z-index:1;background:linear-gradient(180deg,#CEC8F5 0%,#BEB8E8 100%);border-bottom:5px solid #9080C8;}
.k-wall::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 54px,rgba(140,120,200,.1) 54px,rgba(140,120,200,.1) 56px),repeating-linear-gradient(180deg,transparent 0,transparent 44px,rgba(140,120,200,.09) 44px,rgba(140,120,200,.09) 46px);}

.k-bg-oven{position:absolute;left:10px;top:16px;z-index:2;width:92px;height:110px;background:linear-gradient(180deg,#B0A0CC,#847898);border:3px solid #6A5888;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.35);overflow:hidden;}
.k-bg-oven-win{width:70px;height:60px;margin:8px auto 0;background:radial-gradient(ellipse at 50% 40%,#FF8800 0%,#CC4000 40%,#880000 70%,#180000 100%);border:2px solid #555;border-radius:7px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.k-bg-oven-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,rgba(255,180,0,.65),transparent 65%);animation:oGlBg 1.3s ease-in-out infinite;}
@keyframes oGlBg{0%,100%{opacity:.6;}50%{opacity:1.0;}}
.k-bg-oven-food{font-size:1.5rem;z-index:1;filter:drop-shadow(0 0 10px rgba(255,150,0,1));animation:oFoodPulse 2s ease-in-out infinite;}
@keyframes oFoodPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.14);}}
.k-bg-oven-knobs{display:flex;gap:10px;justify-content:center;padding:5px 0 2px;}
.k-bg-oven-knob{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#999,#444);border:2px solid #555;}
.k-bg-oven-knob.on{background:radial-gradient(circle at 35% 35%,#F59020,#C06010);box-shadow:0 0 6px rgba(245,144,32,.7);}

.k-cabinet{position:absolute;top:6px;left:112px;right:112px;height:112px;z-index:2;background:linear-gradient(180deg,#C8A0D8,#A878B8);border:3px solid #886098;border-radius:8px 8px 4px 4px;display:flex;align-items:center;justify-content:space-around;padding:0 10px;box-shadow:0 6px 18px rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.2);}
.k-cab-door{width:60px;height:80px;background:linear-gradient(180deg,#E2C4F2,#C29AD4);border:2.5px solid #886098;border-radius:6px;position:relative;box-shadow:inset 0 2px 0 rgba(255,255,255,.25),0 3px 6px rgba(0,0,0,.2);}
.k-cab-door::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#886098;border-radius:50%;}

.k-fridge{position:absolute;top:16px;right:10px;z-index:2;width:80px;height:110px;background:linear-gradient(90deg,#D5CEF0,#EAE4FF,#CCC8E8);border:3px solid #9080C8;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.2);overflow:hidden;}
.k-fridge::before{content:'';position:absolute;top:10px;left:50%;width:2.5px;height:84px;background:#9080C8;transform:translateX(-50%);}
.k-fridge::after{content:'';position:absolute;top:24px;left:10px;width:9px;height:5px;background:#7868A8;border-radius:2px;}

.k-window{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:3;width:180px;height:130px;border:5px solid #C8A0D8;border-radius:8px 8px 6px 6px;overflow:hidden;box-shadow:0 4px 20px rgba(80,60,160,.35),inset 0 0 20px rgba(100,140,255,.2);}
.k-window-bg{position:absolute;inset:0;background:linear-gradient(180deg,#0A0828 0%,#1A1048 35%,#2A1858 55%,#4A3080 75%,#C8B0E8 100%);}
.k-window-ground{position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(180deg,#E8E4FF 0%,#F0ECFF 100%);border-radius:50% 50% 0 0/10px 10px 0 0;}
.k-window-city{position:absolute;bottom:24px;left:0;right:0;display:flex;align-items:flex-end;gap:2px;padding:0 4px;}
.k-bld{background:linear-gradient(180deg,#2A2050,#1A1040);border-radius:2px 2px 0 0;flex-shrink:0;position:relative;}
.k-bld::before{content:'';position:absolute;inset:3px 2px;background:repeating-linear-gradient(180deg,transparent 0,transparent 4px,rgba(255,230,100,.4) 4px,rgba(255,230,100,.4) 5px),repeating-linear-gradient(90deg,transparent 0,transparent 3px,rgba(255,230,100,.3) 3px,rgba(255,230,100,.3) 4px);}
.k-moon{position:absolute;top:10px;right:18px;z-index:2;width:20px;height:20px;background:radial-gradient(circle at 40% 35%,#FFF8C0,#FFE880);border-radius:50%;box-shadow:0 0 8px rgba(255,240,100,.8),0 0 18px rgba(255,220,50,.4);}
.k-star{position:absolute;background:white;border-radius:50%;animation:starTwinkle 2s ease-in-out infinite;}
@keyframes starTwinkle{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
.snow-container{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:4;}
.snowflake{position:absolute;color:rgba(255,255,255,.95);font-size:10px;animation:snowFall linear infinite;}
@keyframes snowFall{0%{transform:translateY(-15px) rotate(0deg) translateX(0px);opacity:1;}100%{transform:translateY(145px) rotate(400deg) translateX(8px);opacity:.2;}}
.k-window-cross{position:absolute;inset:0;z-index:5;pointer-events:none;}
.k-window-cross::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:4px;background:rgba(200,160,220,.7);transform:translateX(-50%);}
.k-window-cross::after{content:'';position:absolute;left:0;right:0;top:50%;height:4px;background:rgba(200,160,220,.7);transform:translateY(-50%);}
.k-window-glow{position:absolute;inset:-6px;border-radius:10px;box-shadow:0 0 0 2px rgba(200,160,220,.5),inset 0 0 0 2px rgba(200,160,220,.3);pointer-events:none;z-index:6;}

.k-lamp{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:4;display:flex;flex-direction:column;align-items:center;}
.k-lamp-wire{width:2px;height:26px;background:rgba(80,40,120,.5);}
.k-lamp-shade{width:52px;height:30px;background:linear-gradient(180deg,#8060A8,#605080);border-radius:4px 4px 50% 50%;display:flex;align-items:flex-end;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.k-lamp-bulb{width:26px;height:20px;background:radial-gradient(ellipse at 40% 30%,#FFFCE0,#FFE050);border-radius:50%;margin-bottom:-5px;box-shadow:0 0 18px rgba(255,230,50,1),0 0 36px rgba(255,200,30,.8),0 0 70px rgba(255,180,0,.4);animation:lampGl 2.5s ease-in-out infinite;}
@keyframes lampGl{0%,100%{box-shadow:0 0 18px rgba(255,230,50,1),0 0 36px rgba(255,200,30,.8),0 0 70px rgba(255,180,0,.4);}50%{box-shadow:0 0 28px rgba(255,230,50,1),0 0 52px rgba(255,200,30,1),0 0 90px rgba(255,180,0,.6);}}

.k-back-strip{position:absolute;top:170px;left:0;right:0;height:74px;z-index:3;background:linear-gradient(180deg,#B8A0E0 0%,#9878C8 50%,#7858A8 100%);border-top:3px solid rgba(255,255,255,.15);border-bottom:5px solid #4A3080;box-shadow:0 5px 14px rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.18);display:flex;align-items:center;padding:0 8px;gap:6px;overflow:hidden;}
.k-side-left{position:absolute;top:244px;left:0;width:110px;bottom:0;z-index:3;background:linear-gradient(90deg,#B8A0E0,#9878C0);border-right:5px solid #4A3080;display:flex;flex-direction:column;align-items:center;padding:10px 6px 10px;gap:8px;box-shadow:5px 0 14px rgba(0,0,0,.2);overflow:hidden;}
.k-side-right{position:absolute;top:244px;right:0;width:110px;bottom:0;z-index:3;background:linear-gradient(270deg,#B8A0E0,#9878C0);border-left:5px solid #4A3080;display:flex;flex-direction:column;align-items:center;padding:10px 6px 10px;gap:8px;box-shadow:-5px 0 14px rgba(0,0,0,.2);overflow:hidden;}
.k-floor-area{position:absolute;top:244px;left:110px;right:110px;bottom:0;z-index:4;pointer-events:none;overflow:hidden;}

.ksteam{position:absolute;width:6px;height:22px;background:linear-gradient(180deg,rgba(255,255,255,.65),transparent);border-radius:50%;pointer-events:none;filter:blur(3px);animation:stUp ease-out infinite;z-index:6;}
@keyframes stUp{0%{transform:translateY(0) scaleX(1);opacity:.6;}100%{transform:translateY(-52px) scaleX(3);opacity:0;}}

/* BAKER GIRL */
.girl-anchor{position:absolute;z-index:7;bottom:4px;width:80px;animation:girlWalk 6s ease-in-out infinite;opacity:.92;}
@keyframes girlWalk{0%{left:30px; transform:scaleX(1);}40%{left:calc(100% - 110px); transform:scaleX(-1);}50%{left:calc(100% - 110px); transform:scaleX(-1);}90%{left:30px; transform:scaleX(1);}100%{left:30px; transform:scaleX(1);}}
@keyframes armLeft{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
@keyframes armRight{0%,100%{transform:rotate(8deg);}50%{transform:rotate(-8deg);}}

.ibtn{position:relative;cursor:pointer;width:70px;height:66px;background:linear-gradient(180deg,#FDFAFF,#EDE4FF);border:3px solid #A888D8;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 4px 0 #7058A8,0 6px 10px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.8);transition:all .2s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;}
.ibtn:hover:not(.icd){transform:translateY(-3px);box-shadow:0 7px 0 #7058A8,0 10px 14px rgba(0,0,0,.25);}
.ibtn:active:not(.icd){transform:translateY(1px);box-shadow:0 2px 0 #7058A8,0 3px 6px rgba(0,0,0,.2);}
.ibtn.iok{background:linear-gradient(180deg,#E8FFF0,#C8F0D8);border-color:#48B068;box-shadow:0 4px 0 #288048,0 6px 10px rgba(0,0,0,.2);}
.ibtn.icd{opacity:.55;cursor:not-allowed;filter:grayscale(.3);}
.ibtn.ij{animation:itemPop .7s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes itemPop{0%{transform:scale(1) translateY(0);}20%{transform:scale(1.32) translateY(-8px);}55%{transform:scale(1.08) translateY(-3px);}78%{transform:scale(.96) translateY(0);}100%{transform:scale(1) translateY(0);}}
.iico{font-size:1.8rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));}
.ilbl{font-size:.51rem;font-weight:800;color:#7058A8;text-align:center;text-transform:uppercase;letter-spacing:.3px;}
.ibadge{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.ilock{background:#9B7FD4;color:#fff;}.icheck{background:var(--green);color:#fff;animation:bP .4s ease;}.icool{background:var(--red);color:#fff;}
@keyframes bP{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}
.icdnum{font-size:1.3rem;font-weight:900;color:var(--red);}

.kaction{background:rgba(245,240,255,.98);border-top:3px solid #A888D8;padding:12px 16px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.kact-row{display:flex;align-items:center;gap:10px;width:min(420px,90%);}
.kact-bar-bg{flex:1;height:12px;background:var(--lavenderD);border-radius:20px;overflow:hidden;}
.kact-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#9B7FD4,#2ECC71);transition:width .5s ease;}
.kact-cnt{font-weight:800;font-size:.8rem;color:var(--brown2);white-space:nowrap;}
.kact-btn{width:min(380px,92%);padding:14px;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:7px;}
.kact-ready{background:linear-gradient(135deg,#9B7FD4,#7C5CBF);color:#fff;box-shadow:0 6px 20px rgba(124,92,191,.4);}
.kact-ready:hover{transform:translateY(-2px);}
